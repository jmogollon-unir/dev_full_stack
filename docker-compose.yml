# Stack backend Relatos de Papel (MySQL, Redis, RabbitMQ, Eureka, microservicios, API Gateway).
# Front-end: ejecutar en local (FRONT/) apuntando a http://localhost:8080
#
# Uso:
#   docker compose up --build
#
# Puertos: 8080 gateway, 8081 catalogue, 8082 orders, 8083 communications, 8086 users, 8761 eureka,
#          3307 MySQL, 6379 Redis, 5672 RabbitMQ, 15672 RabbitMQ UI, 8025 MailHog UI (correos de prueba)

services:
  mysql:
    image: mysql:8.0
    container_name: rp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3307:3306"
    volumes:
      - rp_mysql_data:/var/lib/mysql
      - ./catalogue/src/main/resources/db/books_catalogue.sql:/docker-entrypoint-initdb.d/01-catalogue.sql:ro
      - ./orders/src/main/resources/db/books_orders.sql:/docker-entrypoint-initdb.d/02-orders.sql:ro
      - ./users/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/03-users.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pmysql"]
      interval: 8s
      timeout: 5s
      retries: 20
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: rp-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rp-rabbitmq
