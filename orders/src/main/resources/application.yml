server:
  port: 8082 # El puerto de este microservicio

# Alineado con el gateway: false = aceptar pedidos sin header accessToken (solo demos).
app:
  security:
    require-access-token: false

spring:
  application:
    name: orders

  ## RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:dwfs}
    password: ${RABBITMQ_PASSWORD:admin}
    virtual-host: ${RABBITMQ_VHOST:/}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/books_orders?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Esquema definido en books_orders.sql (IDs INT)
    show-sql: true # Para ver las consultas en consola

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    # Forzamos que el ID de registro en Eureka sea con la IP y el puerto
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

## RabbitMQ Event Configuration
rabbitmq:
  exchange:
    orders: orders.created
  routing:
    key:
      order:
        created: order.created