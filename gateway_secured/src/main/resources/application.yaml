


server:
  port: 8085 # El puerto de este microservicio

spring:
  application:
    name: gateway_secured

  ## RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:dwfs}
    password: ${RABBITMQ_PASSWORD:admin}
    virtual-host: ${RABBITMQ_VHOST:/}

  datasource:
    url: jdbc:mysql://localhost:6379/gateway_secured?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Esquema definido en books_orders.sql (IDs INT)
    show-sql: true # Para ver las consultas en consola

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    # Forzamos que el ID de registro en Eureka sea con la IP y el puerto
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

## RabbitMQ Event Configuration
rabbitmq:
  exchange:
    orders: orders.created
  routing:
    key:
      order:
        created: order.created